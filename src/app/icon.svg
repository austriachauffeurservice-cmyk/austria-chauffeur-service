<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9bd82" />
      <stop offset="50%" stop-color="#b8934a" />
      <stop offset="100%" stop-color="#8a6721" />
    </linearGradient>
  </defs>

  <!-- Crown on top of the shield -->
  <path d="M 42 22 L 40 14 L 46 17 L 50 11 L 54 17 L 60 14 L 58 22 Z" fill="url(#gold-gradient)" />
  <circle cx="40" cy="13" r="1" fill="url(#gold-gradient)" />
  <circle cx="50" cy="10" r="1.2" fill="url(#gold-gradient)" />
  <circle cx="60" cy="13" r="1" fill="url(#gold-gradient)" />

  <!-- Shield Outer Border -->
  <path d="M 50 83 C 29 73 24 50 24 32 C 38 32 45 28 50 24 C 55 28 62 32 76 32 C 76 50 71 73 50 83 Z" 
        stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linejoin="round" />

  <!-- Shield Inner Border -->
  <path d="M 50 78 C 33 69 29 49 29 35 C 40 35 46 31 50 28 C 54 31 60 35 71 35 C 71 49 67 69 50 78 Z" 
        stroke="url(#gold-gradient)" stroke-width="1" opacity="0.6" stroke-linejoin="round" />

  <!-- Monogram A / Mountain Peaks inside the shield -->
  <path d="M 50 36 L 36 68 H 42 L 50 49 L 58 68 H 64 Z" fill="url(#gold-gradient)" />
  <path d="M 41 58 H 59" stroke="url(#gold-gradient)" stroke-width="2" stroke-linecap="round" />
</svg>
